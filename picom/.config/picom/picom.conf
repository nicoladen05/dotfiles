backend = "glx";

corner-radius = 20;

blur: {
	method = "kawase";
	strength = 8;
	background = false;
  	background-frame = false;
  	background-fixed = false;
}

#inactive-opacity = 0.85;
inactive-dim = 0.1;

# Fading
fading = true;
fade-delta = 5;
fade-in-step = 0.056;
fade-out-step = 0.06;

vsync                  = false;
dbe                    = false;
